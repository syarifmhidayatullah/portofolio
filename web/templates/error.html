{{define "error.html"}}
<!DOCTYPE html>
<html lang="en">
<head>{{template "head" .}}</head>
<body class="bg-zinc-950 text-zinc-100 font-sans antialiased">
{{template "navbar" .}}
<main class="max-w-5xl mx-auto px-6 pt-40 pb-24 text-center">
  <p class="text-6xl font-mono text-zinc-700 mb-4">404</p>
  <h1 class="text-2xl font-semibold text-zinc-300 mb-3">Page not found</h1>
  <p class="text-zinc-500 mb-8">{{if .error}}{{.error}}{{else}}The page you're looking for doesn't exist.{{end}}</p>
  <a href="/" class="inline-flex items-center gap-2 text-sm text-emerald-400 hover:text-emerald-300 transition-colors">
    ← Go home
  </a>
</main>
{{template "footer" .}}
</body>
</html>
{{end}}
