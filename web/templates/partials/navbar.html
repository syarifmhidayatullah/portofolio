{{define "navbar"}}
<header
  x-data="{ open: false, scrolled: false }"
  x-init="window.addEventListener('scroll', () => scrolled = window.scrollY > 20)"
  :class="scrolled ? 'border-b border-zinc-800 bg-zinc-950/90 backdrop-blur-sm' : 'bg-transparent'"
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-300"
>
  <nav class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="/" class="font-mono text-sm text-emerald-400 font-medium tracking-tight hover:text-emerald-300 transition-colors">
      syarifhidayat<span class="text-zinc-400">.</span>dev
    </a>

    <!-- Desktop nav -->
    <ul class="hidden md:flex items-center gap-8">
      <li><a href="/" class="text-sm text-zinc-400 hover:text-zinc-100 transition-colors">Home</a></li>
      <li><a href="/projects" class="text-sm text-zinc-400 hover:text-zinc-100 transition-colors">Projects</a></li>
      <li><a href="/blog" class="text-sm text-zinc-400 hover:text-zinc-100 transition-colors">Blog</a></li>
      <li>
        <a href="/#contact" class="text-sm px-4 py-1.5 rounded-full border border-zinc-700 text-zinc-300 hover:border-emerald-500 hover:text-emerald-400 transition-all">
          Contact
        </a>
      </li>
    </ul>

    <!-- Mobile menu button -->
    <button
      @click="open = !open"
      class="md:hidden p-2 text-zinc-400 hover:text-zinc-100 transition-colors"
      aria-label="Toggle menu"
    >
      <svg x-show="!open" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
      <svg x-show="open" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </nav>

  <!-- Mobile menu -->
  <div
    x-show="open"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 -translate-y-2"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100 translate-y-0"
    x-transition:leave-end="opacity-0 -translate-y-2"
    class="md:hidden border-t border-zinc-800 bg-zinc-950"
    @click.away="open = false"
  >
    <ul class="max-w-5xl mx-auto px-6 py-4 flex flex-col gap-4">
      <li><a href="/" @click="open = false" class="text-sm text-zinc-400 hover:text-zinc-100 transition-colors">Home</a></li>
      <li><a href="/projects" @click="open = false" class="text-sm text-zinc-400 hover:text-zinc-100 transition-colors">Projects</a></li>
      <li><a href="/blog" @click="open = false" class="text-sm text-zinc-400 hover:text-zinc-100 transition-colors">Blog</a></li>
      <li><a href="/#contact" @click="open = false" class="text-sm text-zinc-400 hover:text-zinc-100 transition-colors">Contact</a></li>
    </ul>
  </div>
</header>
{{end}}
